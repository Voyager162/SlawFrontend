<style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-family: 'Poppins', sans-serif; /* Softer, thicker font */
      background-color: #f5f5f5; /* Light background */
      border: 3px solid #ccc; /* Thicker border around table */
      border-radius: 12px;
    }
  
    td {
      padding: 15px 25px;
      text-align: center;
      border: 2px solid #ccc; /* Thicker borders for cells */
    }
  
    td img {
      vertical-align: middle;
    }
  
    td a {
      text-decoration: none;
      color: #333;
      font-size: 20px; /* Thicker text */
      font-weight: 500; /* Slightly bolder */
      transition: color 0.3s ease, background-color 0.3s ease;
    }
  
    td a:hover {
      color: #ffffff;
      background-color: #007bff; /* Subtle background change on hover */
      padding: 10px 15px; /* Adds a button-like feel on hover */
      border-radius: 6px; /* Rounded edges for hover effect */
    }
  
    #loginArea a {
      font-weight: bold;
      color: #ff4500;
    }
  
    #loginArea a:hover {
      background-color: #ff6347;
      color: #ffffff;
    }
  
    /* Mobile responsiveness */
    @media (max-width: 768px) {
      td {
        display: block;
        width: 100%;
        padding: 15px 0;
      }
      
      td a {
        display: block;
        padding: 15px;
        background-color: #e8e8e8;
        border-radius: 8px;
        margin-bottom: 10px;
      }
    }
  </style>
  
  <table>
    <tr>
      <td><img src="{{site.baseurl}}/images/carIcon.png" height="60" title="Home" alt="Home Icon"></td>
      <td><a href="{{site.baseurl}}/luxCars">Luxury Cars</a></td>
      <td><a href="{{site.baseurl}}/ecoCars">Economy Cars</a></td>
      <td><a href="{{site.baseurl}}/vinCars">Vintage Cars</a></td>
      <td><a href="{{site.baseurl}}/trucks">Trucks</a></td>
      <td id="loginArea"><a href="{{site.baseurl}}/login">Profile</a></td>
    </tr>
  </table>
  

<script type="module">
    import { pythonURI, fetchOptions } from '{{site.baseurl}}/assets/js/api/config.js';

    document.addEventListener('DOMContentLoaded', function() {
    getCredentials() // Call the function to get credentials
        .then(data => {
            const loginArea = document.getElementById('loginArea');
            if (data) { // Update the login area based on the data
                // User is authenticated, replace "Login" with User's name
                loginArea.innerHTML = `
                    <div class="dropdown">
                        <button class="dropbtn">${data.name}</button>
                        <div class="dropdown-content">
                            <a href="{{site.baseurl}}/logout">Logout</a>
                            <a href="{{site.baseurl}}/profile">Profile</a>
                            <a href="{{site.baseurl}}/analytics">Analytics</a>
                        </div>
                    </div>
                `;
            } else {
                // User is not authenticated, then "Login" link is shown
                loginArea.innerHTML = '<a href="{{site.baseurl}}/login">Profile</a>';
            }
        })
        .catch(err => { // General error handler
            console.error("Error fetching credentials: ", err);
            // Handle any errors that occurred during getCredentials
        });
    });

    function getCredentials() {
        const URL = pythonURI + '/api/id';
        return fetch(URL, fetchOptions)
            .then(response => { // API response handler 
                if (response.status !== 200) {
                    console.error("HTTP status code: " + response.status);
                    return null; // prepares to stop the chain by returning null.
                }
                return response.json(); // plans to continue the chain with the data.
            })
            .then(data => { // Data handler from the previous promise  
                if (data === null) return null; // stops the chain, returns null.
                console.log(data); // logs data with should contain uid, name, etc.
                return data; // returns data to caller 
            })
            .catch(err => { // General error handler
                console.error("Fetch error: ", err);
                return null;
            });
    }

</script>
